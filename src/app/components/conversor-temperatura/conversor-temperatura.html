<div class="card">
  <div class="card-header bg-primary text-white">
    Conversor de Temperatura
  </div>

  <div class="card-body">
    <div class="mb-3">
      <label class="form-label">Temperatura em Celsius</label>
      <input type="number" class="form-control" [(ngModel)]="celsius">
    </div>

    <button class="btn btn-success" (click)="converter()">
      Converter
    </button>

    <div class="alert alert-info mt-3">
      <p><strong>Fahrenheit:</strong> {{ fahrenheit.toFixed(2) }} °F</p>
      <p><strong>Kelvin:</strong> {{ kelvin.toFixed(2) }} K</p>
    </div>
  </div>
</div>
